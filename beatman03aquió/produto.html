<!DOCTYPE html>
<html>

<head>
    <title>Cadastro de Item</title>
</head>

<body bgcolor="DarkGray">

    <center>
        <h1>
            <font color="Indigo">Itens Sobrenaturais</font>
        </h1>

        <h2>
            <font color="black">Lâmina de Anjo</font>
        </h2>
        <img src="lamina.jpg" width="200">
        <p>
            <font color="black">Uma arma usada para derrotar anjos e demônios.</font>
        </p>

        <h2>
            <font color="black">Colt</font>
        </h2>
        <img src="colt.jpg" width="200">
        <p>
            <font color="black">Arma lendária capaz de matar criaturas.</font>
        </p>

        <h2>
            <font color="black">Sal Grosso</font>
        </h2>
        <img src="salgrosso.png" width="200">
        <p>
            <font color="black">Proteção contra espíritos.</font>
        </p>

        <hr>

        <h1>
            <font color="Indigo">Cadastrar Novo Item</font>
        </h1>

        <form action="principal.html">
            <p>
                <font color="black">Nome do item:</font>
            </p>
            <input type="text">

            <p>
                <font color="black">Descrição:</font>
            </p>
            <input type="text">

            <p>
                <font color="black">Unidade:</font>
            </p>
            <input type="text">

            <p>
                <font color="black">Quantidade:</font>
            </p>
            <input type="number">

            <p>
                <font color="black">Valor:</font>
            </p>
            <input type="number">

            <br><br>
            <input type="submit" value="Cadastrar">
        </form>

        <br><br>

        <a href="principal.html">
            <font color="Indigo">Voltar</font>
        </a>

    </center>

</body>

</html>
